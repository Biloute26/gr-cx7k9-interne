<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Relais</title>
<style>
  :root{
    --bg:#11161d;
    --surface:#1a212b;
    --surface-2:#222c39;
    --line:#2e3a49;
    --ink:#e8edf3;
    --ink-soft:#9aa8b8;
    --accent:#d9a441;      /* laiton / cuivre, sobre */
    --accent-deep:#b8841f;
    --green:#4caf72;
    --red:#d96a5b;
    --blue:#5b9bd5;
    --radius:10px;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  /* ---------- VERROU ---------- */
  #gate{
    position:fixed;inset:0;z-index:1000;
    background:radial-gradient(circle at 50% 30%,#1d2733,#11161d 70%);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;padding:24px;
  }
  #gate .lock-card{
    width:100%;max-width:360px;text-align:center;
  }
  #gate .badge{
    width:54px;height:54px;border-radius:50%;
    background:linear-gradient(145deg,var(--accent),var(--accent-deep));
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 18px;font-size:24px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #gate h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
  #gate p{color:var(--ink-soft);font-size:13px;margin-bottom:24px}
  #gate input{
    width:100%;padding:13px 15px;border-radius:var(--radius);
    border:1px solid var(--line);background:var(--surface);
    color:var(--ink);font-size:15px;text-align:center;letter-spacing:.5px;
    margin-bottom:10px;
  }
  #gate input:focus{outline:none;border-color:var(--accent)}
  #gate button{
    width:100%;padding:13px;border:none;border-radius:var(--radius);
    background:var(--accent);color:#1a1206;font-weight:700;font-size:15px;
    transition:background .15s;
  }
  #gate button:hover{background:var(--accent-deep)}
  #gate .err{color:var(--red);font-size:13px;height:18px;margin-top:8px}
  #gate .stay-row{
    display:flex;align-items:center;gap:8px;justify-content:center;
    font-size:13px;color:var(--ink-soft);margin-bottom:14px;cursor:pointer;
  }
  #gate .stay-row input{width:auto;margin:0;accent-color:var(--accent);cursor:pointer}

  /* ---------- LAYOUT ---------- */
  #app{display:none}
  header.topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(17,22,29,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;
    padding:12px 18px;
  }
  .topbar .logo{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(145deg,var(--accent),var(--accent-deep));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#1a1206;font-size:15px;flex-shrink:0;
  }
  .topbar .title{font-weight:700;font-size:16px;letter-spacing:-.2px}
  .topbar .title small{display:block;font-weight:400;font-size:11px;color:var(--ink-soft);letter-spacing:0}
  .topbar .spacer{flex:1}
  .sync-pill{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--ink-soft);
    padding:5px 10px;border:1px solid var(--line);border-radius:20px;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-soft)}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.busy{background:var(--accent);animation:pulse 1s infinite}
  .sync-dot.err{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .icon-btn{
    background:var(--surface);border:1px solid var(--line);
    color:var(--ink-soft);width:34px;height:34px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:15px;
  }
  .icon-btn:hover{color:var(--ink);border-color:var(--accent)}

  /* ---------- IDENTITE ---------- */
  .whoami-bar{
    display:flex;align-items:center;gap:8px;
    padding:8px 18px;background:var(--surface);
    border-bottom:1px solid var(--line);font-size:13px;
  }
  .whoami-bar select{
    background:var(--surface-2);border:1px solid var(--line);color:var(--ink);
    padding:5px 9px;border-radius:7px;font-size:13px;
  }
  .whoami-bar .lbl{color:var(--ink-soft)}

  /* ---------- TABS ---------- */
  nav.tabs{
    display:flex;gap:4px;padding:12px 18px 0;
    border-bottom:1px solid var(--line);overflow-x:auto;
  }
  nav.tabs button{
    background:none;border:none;color:var(--ink-soft);
    padding:10px 16px;font-size:14px;font-weight:600;
    border-bottom:2px solid transparent;white-space:nowrap;
    display:flex;align-items:center;gap:7px;
  }
  nav.tabs button .count{
    background:var(--surface-2);color:var(--ink-soft);
    font-size:11px;padding:1px 7px;border-radius:10px;font-weight:700;
  }
  nav.tabs button.active{color:var(--ink);border-bottom-color:var(--accent)}
  nav.tabs button.active .count{background:var(--accent);color:#1a1206}

  main{max-width:840px;margin:0 auto;padding:22px 18px 80px}
  .panel{display:none}
  .panel.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:16px;gap:12px;flex-wrap:wrap;
  }
  .section-head h2{font-size:19px;font-weight:700;letter-spacing:-.3px}
  .btn-primary{
    background:var(--accent);color:#1a1206;border:none;
    padding:9px 16px;border-radius:8px;font-weight:700;font-size:13px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-ghost{
    background:var(--surface);color:var(--ink);border:1px solid var(--line);
    padding:9px 14px;border-radius:8px;font-weight:600;font-size:13px;
  }
  .btn-ghost:hover{border-color:var(--accent)}

  /* ---------- CARTES ---------- */
  .card{
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:15px 16px;margin-bottom:12px;
  }
  .card .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);margin-bottom:8px;flex-wrap:wrap}
  .tag{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700}
  .tag.urgent{background:rgba(217,106,91,.18);color:#f0a99f}
  .tag.encours{background:rgba(217,164,65,.18);color:var(--accent)}
  .tag.traite{background:rgba(76,175,114,.18);color:#86d7a4}
  .author{font-weight:700;color:var(--ink)}
  .card h3{font-size:15px;margin-bottom:5px}
  .card .body-text{font-size:14px;color:var(--ink);white-space:pre-wrap;word-wrap:break-word}
  .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .card-actions button{
    background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);
    padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;
  }
  .card-actions button:hover{color:var(--ink);border-color:var(--accent)}
  .card-actions button.danger:hover{color:var(--red);border-color:var(--red)}

  /* ---------- REPERTOIRE ---------- */
  .search-box{
    width:100%;padding:11px 15px;border-radius:var(--radius);
    border:1px solid var(--line);background:var(--surface);
    color:var(--ink);font-size:14px;margin-bottom:16px;
  }
  .search-box:focus{outline:none;border-color:var(--accent)}
  .contact-row{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;
  }
  .contact-row .avatar{
    width:40px;height:40px;border-radius:9px;flex-shrink:0;
    background:var(--surface-2);display:flex;align-items:center;justify-content:center;
    font-weight:700;color:var(--accent);font-size:15px;
  }
  .contact-row .info{flex:1;min-width:0}
  .contact-row .name{font-weight:700;font-size:14px}
  .contact-row .sub{font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .contact-row .cat-chip{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .contact-row a.call{
    background:var(--green);color:#06160c;text-decoration:none;
    padding:8px 12px;border-radius:7px;font-weight:700;font-size:13px;flex-shrink:0;
  }
  .contact-row .del{
    background:none;border:none;color:var(--ink-soft);font-size:16px;flex-shrink:0;
  }
  .contact-row .del:hover{color:var(--red)}

  /* ---------- EMPTY ---------- */
  .empty{
    text-align:center;padding:50px 20px;color:var(--ink-soft);
  }
  .empty .ico{font-size:34px;opacity:.5;margin-bottom:10px}
  .empty p{font-size:14px}

  /* ---------- MODAL ---------- */
  .modal-bg{
    position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);
    display:none;align-items:flex-end;justify-content:center;padding:0;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--surface);border:1px solid var(--line);
    border-radius:16px 16px 0 0;width:100%;max-width:560px;
    padding:22px;max-height:90vh;overflow-y:auto;
    animation:slideup .25s;
  }
  @keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  @media(min-width:600px){
    .modal-bg{align-items:center}
    .modal{border-radius:16px}
  }
  .modal h3{font-size:17px;margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:600}
  .field input,.field textarea,.field select{
    width:100%;padding:11px 13px;border-radius:8px;
    border:1px solid var(--line);background:var(--surface-2);
    color:var(--ink);font-size:14px;
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:80px}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .modal-actions button{flex:1;padding:12px;border-radius:8px;font-weight:700;font-size:14px;border:none}
  .modal-actions .save{background:var(--accent);color:#1a1206}
  .modal-actions .cancel{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .logout-btn{
    width:100%;margin-top:12px;padding:11px;border-radius:8px;
    background:none;border:1px solid var(--line);color:var(--ink-soft);
    font-size:13px;font-weight:600;
  }
  .logout-btn:hover{color:var(--red);border-color:var(--red)}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--surface-2);border:1px solid var(--line);color:var(--ink);
    padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;
    z-index:300;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ====================== VERROU ====================== -->
<div id="gate">
  <div class="lock-card">
    <div class="badge">🔒</div>
    <h1>Relais</h1>
    <p>Espace interne — accès réservé</p>
    <input type="password" id="gatePass" placeholder="Code d'accès" autocomplete="off">
    <label class="stay-row"><input type="checkbox" id="stayConnected"> <span>Rester connecté sur cet appareil</span></label>
    <button onclick="tryUnlock()">Entrer</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<!-- ====================== APP ====================== -->
<div id="app">
  <header class="topbar">
    <div class="logo">R</div>
    <div class="title">Relais<small>Communication inter-services</small></div>
    <div class="spacer"></div>
    <div class="sync-pill"><span class="sync-dot" id="syncDot"></span><span id="syncTxt">—</span></div>
    <button class="icon-btn" onclick="manualSync()" title="Rafraîchir">↻</button>
    <button class="icon-btn" onclick="openConfig()" title="Réglages">⚙</button>
  </header>

  <div class="whoami-bar">
    <span class="lbl">Connecté en tant que :</span>
    <select id="whoami" onchange="setWho(this.value)">
      <option value="">—</option>
    </select>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="bons" onclick="showTab('bons')">🛠 Bons d'intervention <span class="count" id="cnt-bons">0</span></button>
    <button class="tab-btn" data-tab="messages" onclick="showTab('messages')">💬 Messages & infos <span class="count" id="cnt-messages">0</span></button>
    <button class="tab-btn" data-tab="repertoire" onclick="showTab('repertoire')">📇 Répertoire <span class="count" id="cnt-repertoire">0</span></button>
  </nav>

  <main>
    <!-- BONS -->
    <section class="panel active" id="panel-bons">
      <div class="section-head">
        <h2>Bons d'intervention</h2>
        <button class="btn-primary" onclick="openBon()">+ Nouveau bon</button>
      </div>
      <div id="list-bons"></div>
    </section>

    <!-- MESSAGES -->
    <section class="panel" id="panel-messages">
      <div class="section-head">
        <h2>Messages & infos</h2>
        <button class="btn-primary" onclick="openMsg()">+ Nouveau message</button>
      </div>
      <div id="list-messages"></div>
    </section>

    <!-- REPERTOIRE -->
    <section class="panel" id="panel-repertoire">
      <div class="section-head">
        <h2>Répertoire prestataires</h2>
        <button class="btn-primary" onclick="openContact()">+ Ajouter</button>
      </div>
      <input type="text" class="search-box" id="searchContact" placeholder="Rechercher un prestataire, un numéro, une catégorie…" oninput="renderContacts()">
      <div id="list-repertoire"></div>
    </section>
  </main>
</div>

<!-- ====================== MODALES ====================== -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalInner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   RELAIS — carnet collaboratif inter-services (v1)
   Stockage : JSONBin (clé saisie par chaque utilisateur, non stockée en dur)
   ================================================================ */

const ACCESS_CODE = "RelaisRichard75";
const LS_KEY_BINID  = "relais_binid";
const LS_KEY_APIKEY = "relais_apikey";
const LS_KEY_WHO    = "relais_who";
const LS_KEY_STAY   = "relais_stay";
const USERS = ["Service A","Service B","Service C"]; // renommables plus tard
const POLL_MS = 15000;

let DATA = { bons:[], messages:[], contacts:[] };
let WHO = localStorage.getItem(LS_KEY_WHO) || "";
let pollTimer = null;
let saving = false;

/* ---------- VERROU ---------- */
function unlock(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  boot();
}
function tryUnlock(){
  const v = document.getElementById('gatePass').value.trim();
  if(v === ACCESS_CODE){
    if(document.getElementById('stayConnected').checked){
      localStorage.setItem(LS_KEY_STAY,'1');
    } else {
      localStorage.removeItem(LS_KEY_STAY);
    }
    unlock();
  } else {
    document.getElementById('gateErr').textContent = "Code incorrect.";
    document.getElementById('gatePass').value='';
  }
}
document.getElementById('gatePass').addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });

/* Auto-déverrouillage si "rester connecté" a été coché */
if(localStorage.getItem(LS_KEY_STAY)==='1'){
  window.addEventListener('DOMContentLoaded',unlock);
}

/* ---------- BOOT ---------- */
function boot(){
  // remplir le sélecteur d'identité
  const sel = document.getElementById('whoami');
  USERS.forEach(u=>{
    const o=document.createElement('option'); o.value=u; o.textContent=u; sel.appendChild(o);
  });
  if(WHO){ sel.value=WHO; }

  const binId = localStorage.getItem(LS_KEY_BINID);
  const apiKey = localStorage.getItem(LS_KEY_APIKEY);
  if(!binId || !apiKey){
    openConfig(true);
  } else {
    loadFromCloud();
    startPolling();
  }
}

function setWho(v){ WHO=v; localStorage.setItem(LS_KEY_WHO,v); }

function logout(){
  localStorage.removeItem(LS_KEY_STAY);
  location.reload();
}

/* ---------- CONFIG JSONBIN ---------- */
function openConfig(first=false){
  const binId = localStorage.getItem(LS_KEY_BINID)||"";
  const apiKey = localStorage.getItem(LS_KEY_APIKEY)||"";
  const inner = document.getElementById('modalInner');
  inner.innerHTML = `
    <h3>Connexion au carnet partagé</h3>
    ${first?'<p style="color:var(--ink-soft);font-size:13px;margin-bottom:16px">Première utilisation sur cet appareil. Saisis la clé JSONBin et l’identifiant du carnet (les mêmes pour vous trois). Ils restent mémorisés ici, jamais dans le code.</p>':''}
    <div class="field"><label>Clé API JSONBin (X-Master-Key)</label><input id="cfgKey" value="${apiKey}" placeholder="$2a$10$..."></div>
    <div class="field"><label>Identifiant du carnet (Bin ID)</label><input id="cfgBin" value="${binId}" placeholder="ex : 6a29...0406"></div>
    <div class="modal-actions">
      ${first?'':'<button class="cancel" onclick="closeModal()">Annuler</button>'}
      <button class="save" onclick="saveConfig()">Connecter</button>
    </div>
    ${first?'':`<button class="logout-btn" onclick="logout()">Verrouiller et se déconnecter</button>`}`;
  showModal();
}
async function saveConfig(){
  const key = document.getElementById('cfgKey').value.trim();
  const bin = document.getElementById('cfgBin').value.trim();
  if(!key){ toast("Clé manquante"); return; }
  localStorage.setItem(LS_KEY_APIKEY,key);
  if(bin){
    localStorage.setItem(LS_KEY_BINID,bin);
    closeModal();
    await loadFromCloud();
    startPolling();
  } else {
    // pas de bin → on en crée un
    closeModal();
    await createBin(key);
  }
}
async function createBin(key){
  setSync('busy','Création du carnet…');
  try{
    const r = await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":key,"X-Bin-Private":"true","X-Bin-Name":"relais-carnet"},
      body:JSON.stringify(DATA)
    });
    const j = await r.json();
    const id = j.metadata && j.metadata.id;
    if(id){
      localStorage.setItem(LS_KEY_BINID,id);
      setSync('ok','Carnet créé');
      toast("Carnet créé. Partage cet identifiant : "+id);
      renderAll();
      startPolling();
    } else { throw new Error("réponse inattendue"); }
  }catch(e){ setSync('err','Échec création'); toast("Impossible de créer le carnet — vérifie la clé."); }
}

/* ---------- CLOUD I/O ---------- */
function headers(){
  return {"Content-Type":"application/json","X-Master-Key":localStorage.getItem(LS_KEY_APIKEY)};
}
function binUrl(){
  return "https://api.jsonbin.io/v3/b/"+localStorage.getItem(LS_KEY_BINID);
}
async function loadFromCloud(){
  setSync('busy','Chargement…');
  try{
    const r = await fetch(binUrl()+"/latest",{headers:headers()});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    const rec = j.record || {};
    DATA = { bons:rec.bons||[], messages:rec.messages||[], contacts:rec.contacts||[] };
    renderAll();
    setSync('ok','À jour');
  }catch(e){ setSync('err','Hors ligne'); toast("Lecture impossible — vérifie clé et identifiant."); }
}
async function saveToCloud(){
  if(saving) return;
  saving=true; setSync('busy','Enregistrement…');
  try{
    const r = await fetch(binUrl(),{method:"PUT",headers:headers(),body:JSON.stringify(DATA)});
    if(!r.ok) throw new Error(r.status);
    setSync('ok','À jour');
  }catch(e){ setSync('err','Échec enregistrement'); toast("Enregistrement impossible."); }
  saving=false;
}
function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(()=>{ if(!saving) loadFromCloud(); },POLL_MS);
}
function manualSync(){ loadFromCloud(); }

function setSync(state,txt){
  const dot=document.getElementById('syncDot');
  dot.className='sync-dot'+(state==='ok'?' ok':state==='busy'?' busy':state==='err'?' err':'');
  document.getElementById('syncTxt').textContent=txt;
}

/* ---------- RENDER ---------- */
function renderAll(){ renderBons(); renderMsgs(); renderContacts(); updateCounts(); }
function updateCounts(){
  document.getElementById('cnt-bons').textContent=DATA.bons.length;
  document.getElementById('cnt-messages').textContent=DATA.messages.length;
  document.getElementById('cnt-repertoire').textContent=DATA.contacts.length;
}
function fmtDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ----- BONS ----- */
function renderBons(){
  const box=document.getElementById('list-bons');
  if(!DATA.bons.length){ box.innerHTML=emptyHTML('🛠','Aucun bon d’intervention pour le moment.'); return; }
  box.innerHTML = DATA.bons.slice().sort((a,b)=>b.ts-a.ts).map(b=>{
    const st = b.statut||'encours';
    const tagcls = st==='traite'?'traite':st==='urgent'?'urgent':'encours';
    const tagtxt = st==='traite'?'Traité':st==='urgent'?'Urgent':'En cours';
    return `<div class="card">
      <div class="meta"><span class="tag ${tagcls}">${tagtxt}</span><span class="author">${esc(b.auteur)}</span>· ${fmtDate(b.ts)}</div>
      <h3>${esc(b.titre)}</h3>
      <div class="body-text">${esc(b.desc)}</div>
      <div class="card-actions">
        ${st!=='traite'?`<button onclick="setBonStatut('${b.id}','traite')">✓ Marquer traité</button>`:`<button onclick="setBonStatut('${b.id}','encours')">↺ Rouvrir</button>`}
        ${st!=='urgent'&&st!=='traite'?`<button onclick="setBonStatut('${b.id}','urgent')">⚠ Urgent</button>`:''}
        <button class="danger" onclick="delItem('bons','${b.id}')">Supprimer</button>
      </div>
    </div>`;
  }).join('');
}
function openBon(){
  document.getElementById('modalInner').innerHTML=`
    <h3>Nouveau bon d'intervention</h3>
    <div class="field"><label>Objet</label><input id="bTitre" placeholder="Ex : Fuite chaufferie sous-sol"></div>
    <div class="field"><label>Description</label><textarea id="bDesc" placeholder="Détails, lieu, prestataire concerné…"></textarea></div>
    <div class="field"><label>Statut</label><select id="bStatut"><option value="encours">En cours</option><option value="urgent">Urgent</option></select></div>
    <div class="modal-actions"><button class="cancel" onclick="closeModal()">Annuler</button><button class="save" onclick="saveBon()">Créer le bon</button></div>`;
  showModal();
}
function saveBon(){
  const t=document.getElementById('bTitre').value.trim();
  if(!t){ toast("Objet requis"); return; }
  if(!WHO){ toast("Choisis ton service en haut"); return; }
  DATA.bons.push({id:uid(),titre:t,desc:document.getElementById('bDesc').value.trim(),statut:document.getElementById('bStatut').value,auteur:WHO,ts:Date.now()});
  closeModal(); renderAll(); saveToCloud();
}
function setBonStatut(id,st){
  const b=DATA.bons.find(x=>x.id===id); if(b){ b.statut=st; renderAll(); saveToCloud(); }
}

/* ----- MESSAGES ----- */
function renderMsgs(){
  const box=document.getElementById('list-messages');
  if(!DATA.messages.length){ box.innerHTML=emptyHTML('💬','Aucun message. Lance la conversation entre services.'); return; }
  box.innerHTML = DATA.messages.slice().sort((a,b)=>b.ts-a.ts).map(m=>`
    <div class="card">
      <div class="meta"><span class="author">${esc(m.auteur)}</span>· ${fmtDate(m.ts)}</div>
      <div class="body-text">${esc(m.texte)}</div>
      <div class="card-actions"><button class="danger" onclick="delItem('messages','${m.id}')">Supprimer</button></div>
    </div>`).join('');
}
function openMsg(){
  document.getElementById('modalInner').innerHTML=`
    <h3>Nouveau message</h3>
    <div class="field"><label>Message / info à passer</label><textarea id="mTexte" placeholder="Écris ton message…" style="min-height:120px"></textarea></div>
    <div class="modal-actions"><button class="cancel" onclick="closeModal()">Annuler</button><button class="save" onclick="saveMsg()">Publier</button></div>`;
  showModal();
  setTimeout(()=>document.getElementById('mTexte').focus(),100);
}
function saveMsg(){
  const t=document.getElementById('mTexte').value.trim();
  if(!t){ toast("Message vide"); return; }
  if(!WHO){ toast("Choisis ton service en haut"); return; }
  DATA.messages.push({id:uid(),texte:t,auteur:WHO,ts:Date.now()});
  closeModal(); renderAll(); saveToCloud();
}

/* ----- CONTACTS ----- */
function renderContacts(){
  const box=document.getElementById('list-repertoire');
  const q=(document.getElementById('searchContact').value||'').toLowerCase().trim();
  let list=DATA.contacts.slice();
  if(q){
    list=list.filter(c=>(c.nom+' '+c.tel+' '+(c.cat||'')+' '+(c.note||'')).toLowerCase().includes(q));
  }
  list.sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
  if(!list.length){ box.innerHTML=emptyHTML('📇',q?'Aucun résultat.':'Aucun prestataire enregistré.'); return; }
  box.innerHTML=list.map(c=>{
    const tel=(c.tel||'').replace(/\s/g,'');
    return `<div class="contact-row">
      <div class="avatar">${esc((c.nom||'?').charAt(0).toUpperCase())}</div>
      <div class="info">
        ${c.cat?`<div class="cat-chip">${esc(c.cat)}</div>`:''}
        <div class="name">${esc(c.nom)}</div>
        <div class="sub">${esc(c.tel)}${c.note?' · '+esc(c.note):''}</div>
      </div>
      ${tel?`<a class="call" href="tel:${esc(tel)}">Appeler</a>`:''}
      <button class="del" onclick="delItem('contacts','${c.id}')" title="Supprimer">×</button>
    </div>`;
  }).join('');
}
function openContact(){
  document.getElementById('modalInner').innerHTML=`
    <h3>Ajouter un prestataire</h3>
    <div class="field"><label>Nom / société</label><input id="cNom" placeholder="Ex : Sanitherm"></div>
    <div class="field"><label>Téléphone</label><input id="cTel" placeholder="01 23 45 67 89" inputmode="tel"></div>
    <div class="field"><label>Catégorie</label><input id="cCat" placeholder="Plomberie, électricité, ascenseur…"></div>
    <div class="field"><label>Note (optionnel)</label><input id="cNote" placeholder="Astreinte, contact, n° contrat…"></div>
    <div class="modal-actions"><button class="cancel" onclick="closeModal()">Annuler</button><button class="save" onclick="saveContact()">Ajouter</button></div>`;
  showModal();
}
function saveContact(){
  const n=document.getElementById('cNom').value.trim();
  if(!n){ toast("Nom requis"); return; }
  DATA.contacts.push({id:uid(),nom:n,tel:document.getElementById('cTel').value.trim(),cat:document.getElementById('cCat').value.trim(),note:document.getElementById('cNote').value.trim()});
  closeModal(); renderAll(); saveToCloud();
}

/* ----- COMMUN ----- */
function delItem(type,id){
  DATA[type]=DATA[type].filter(x=>x.id!==id);
  renderAll(); saveToCloud();
}
function emptyHTML(ico,txt){ return `<div class="empty"><div class="ico">${ico}</div><p>${txt}</p></div>`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------- TABS / MODAL / TOAST ---------- */
function showTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t));
}
function showModal(){ document.getElementById('modalBg').classList.add('show'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
